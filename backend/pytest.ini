[pytest]
addopts = -q --cov=app --cov-report=term-missing --cov-fail-under=40
env =
    MODEL_HF=unsloth/Qwen3.5-9B-GGUF:UD-Q4_K_XL
    MODEL_CONTEXT_SIZE=128000
    ADMIN_LOGIN=admin
    ADMIN_PASS=admin123
    LLAMA_HOST=localhost
    LLAMA_PORT=8765
    MODEL_MULTIMODAL=True
    MAX_QUEUE_SIZE=3
    RAW_MESSAGES_SIZE=10
    MESSAGES_SUMMARY_SIZE=5
    SUMMARY_TOKENS_SIZE=12000
    SUMMARY_MODEL_HF=unsloth/Qwen3.5-9B-GGUF:UD-Q4_K_XL
    SUMMARY_MODEL_CONTEXT_SIZE=32768
    DATABASE_URL=sqlite+aiosqlite:///./test.db
    REDIS_URL=redis://localhost:6379/0
    QDRANT_URL=http://localhost:6333
    EMBEDDING_MODEL=sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
    LOG_LEVEL=INFO
    JWT_SECRET=test-secret-token
