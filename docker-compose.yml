services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./backend
      target: api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      target: worker
    env_file:
      - .env
    depends_on:
      - api
      - postgres
      - redis
      - qdrant
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ragapp
      POSTGRES_PASSWORD: ragapp
      POSTGRES_DB: ragapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  llama:
    image: ${LLAMA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    platform: ${LLAMA_PLATFORM:-linux/amd64}
    profiles:
      - llama
    environment:
      HOME: /models
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface/hub
      XDG_CACHE_HOME: /models/.cache
      LLAMA_CACHE: /models/llama-cache
    command: >
      -hf ${MODEL_HF}
      -c ${MODEL_CONTEXT_SIZE}
      --n-gpu-layers 0
      --threads ${LLAMA_THREADS:-8}
      --parallel ${LLAMA_PARALLEL:-1}
      ${LLAMA_EXTRA_ARGS:-}
      --host 0.0.0.0
      --port ${LLAMA_PORT}
    ports:
      - "${LLAMA_PORT}:${LLAMA_PORT}"
    volumes:
      - ${LLAMA_MODELS_DIR:-./models/llama.cpp}:/models
      - ${LLAMA_MODELS_DIR:-./models/llama.cpp}/.cache:/root/.cache
    restart: unless-stopped

  llama-cuda:
    image: ${LLAMA_CUDA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    platform: ${LLAMA_PLATFORM:-linux/amd64}
    profiles:
      - llama-cuda
    gpus: all
    environment:
      HOME: /models
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface/hub
      XDG_CACHE_HOME: /models/.cache
      LLAMA_CACHE: /models/llama-cache
    command: >
      -hf ${MODEL_HF}
      -c ${MODEL_CONTEXT_SIZE}
      --n-gpu-layers ${LLAMA_N_GPU_LAYERS:-999}
      --threads ${LLAMA_THREADS:-8}
      --parallel ${LLAMA_PARALLEL:-1}
      ${LLAMA_EXTRA_ARGS:-}
      --host 0.0.0.0
      --port ${LLAMA_PORT}
    ports:
      - "${LLAMA_PORT}:${LLAMA_PORT}"
    volumes:
      - ${LLAMA_MODELS_DIR:-./models/llama.cpp}:/models
      - ${LLAMA_MODELS_DIR:-./models/llama.cpp}/.cache:/root/.cache
    networks:
      default:
        aliases:
          - llama
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
